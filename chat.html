<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIcura - Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background-color: #ffffff;
            color: #000;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
        }

        /* Header */
        header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .back-button {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 1.25rem;
            padding: 0.5rem;
            transition: color 0.3s;
        }

        .back-button:hover {
            color: #000;
        }

        .mode-select {
            padding: 0.5rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            cursor: pointer;
            background: #fff;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            margin-bottom: 1rem;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 1rem;
            border-radius: 1rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 0.25rem;
        }

        .message.assistant .message-bubble {
            background: #f3f4f6;
            color: #000;
            border-bottom-left-radius: 0.25rem;
        }

        .message-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 0.5rem;
            margin-top: 0.5rem;
        }

        /* Input Area */
        .input-area {
            padding: 1.5rem;
            border-top: 1px solid #e5e7eb;
            background: #fff;
        }

        .input-wrapper {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .mode-dropdown {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .mode-dropdown label {
            font-size: 0.875rem;
            color: #666;
        }

        .mode-dropdown select {
            padding: 0.5rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            cursor: pointer;
            background: #fff;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
        }

        .upload-button {
            padding: 0.5rem 1rem;
            background: #f3f4f6;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.3s;
        }

        .upload-button:hover {
            background: #e5e7eb;
        }

        .upload-button.active {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }

        #fileInput {
            display: none;
        }

        .chat-input-container {
            display: flex;
            gap: 0.75rem;
            width: 100%;
        }

        .message-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-family: inherit;
            resize: none;
            max-height: 100px;
        }

        .message-input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .send-button {
            padding: 0.75rem 1.5rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s;
        }

        .send-button:hover:not(:disabled) {
            background: #1d4ed8;
        }

        .send-button:disabled {
            background: #d1d5db;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .image-preview {
            font-size: 0.875rem;
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .empty-state h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            font-size: 0.875rem;
        }

        /* Scrollbar */
        .chat-area::-webkit-scrollbar {
            width: 8px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .chat-area::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        @media (max-width: 768px) {
            .container {
                border-radius: 0;
            }

            .message-bubble {
                max-width: 85%;
            }

            header {
                padding: 1rem;
            }

            .input-area {
                padding: 1rem;
            }

            .empty-state-icon {
                font-size: 2rem;
            }

            .empty-state h2 {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-left">
                <button class="back-button" onclick="goHome()">← Back</button>
                <div class="logo">AIcura</div>
            </div>
        </header>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="empty-state">
                <div class="empty-state-icon">💬</div>
                <h2>Welcome to AIcura</h2>
                <p>Start a conversation about retinal health or upload an image to analyze</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <!-- Mode Selection -->
            <div class="input-wrapper">
                <div class="mode-dropdown">
                    <label>Mode:</label>
                    <select id="modeSelect" onchange="updateMode()">
                        <option value="no-image">No Image (Education)</option>
                        <option value="retina">Retina (Fundus)</option>
                    </select>
                </div>

                <!-- Image Upload Button -->
                <div class="file-input-wrapper">
                    <button class="upload-button" id="uploadBtn" onclick="document.getElementById('fileInput').click()" disabled>📁 Upload Image</button>
                    <input type="file" id="fileInput" accept="image/*" onchange="handleImageSelect()">
                </div>

                <!-- Image Preview -->
                <div class="image-preview" id="imagePreview"></div>
            </div>

            <!-- Chat Input -->
            <div class="chat-input-container">
                <textarea class="message-input" id="messageInput" placeholder="Ask about retinal health, diabetic retinopathy, or anything else..." rows="1"></textarea>
                <button class="send-button" id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let selectedImage = null;
        let selectedImagePreview = null;

        function updateMode() {
            const mode = document.getElementById('modeSelect').value;
            const uploadBtn = document.getElementById('uploadBtn');
            
            if (mode === 'retina') {
                uploadBtn.disabled = false;
            } else {
                uploadBtn.disabled = true;
                selectedImage = null;
                selectedImagePreview = null;
                document.getElementById('imagePreview').innerHTML = '';
                document.getElementById('fileInput').value = '';
            }
        }

        function handleImageSelect() {
            const file = document.getElementById('fileInput').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedImage = file;
                    selectedImagePreview = e.target.result;
                    document.getElementById('imagePreview').innerHTML = '✓ Image ready';
                };
                reader.readAsDataURL(file);
            }
        }

        function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();

            if (!message && !selectedImage) return;

            const chatArea = document.getElementById('chatArea');

            // Remove empty state if exists
            const emptyState = chatArea.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            // Add user message
            const userMessageDiv = document.createElement('div');
            userMessageDiv.className = 'message user';
            
            let messageHTML = `<div class="message-bubble">${escapeHtml(message)}`;
            
            if (selectedImagePreview) {
                messageHTML += `<img src="${selectedImagePreview}" class="message-image">`;
            }
            
            messageHTML += `</div>`;
            userMessageDiv.innerHTML = messageHTML;
            chatArea.appendChild(userMessageDiv);

            // Clear input
            messageInput.value = '';
            messageInput.style.height = 'auto';
            selectedImage = null;
            selectedImagePreview = null;
            document.getElementById('imagePreview').innerHTML = '';
            document.getElementById('fileInput').value = '';

            // Auto scroll
            chatArea.scrollTop = chatArea.scrollHeight;

            // Simulate AI response
            setTimeout(() => {
                const aiMessageDiv = document.createElement('div');
                aiMessageDiv.className = 'message assistant';
                aiMessageDiv.innerHTML = `<div class="message-bubble">
                    Thank you for your message! I'm analyzing your input. This is an educational tool to help you learn about retinal health analysis. If you need actual medical diagnosis, please consult a qualified healthcare professional. ⚠️ Educational only – Not a medical diagnosis.
                </div>`;
                chatArea.appendChild(aiMessageDiv);
                chatArea.scrollTop = chatArea.scrollHeight;
            }, 500);

            // Focus back to input
            messageInput.focus();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        // Auto-resize textarea
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // Send on Enter, Shift+Enter for new line
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Update send button state
        function updateSendButton() {
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = !messageInput.value.trim() && !selectedImage;
        }

        document.getElementById('messageInput').addEventListener('input', updateSendButton);
    </script>
</body>
</html>
